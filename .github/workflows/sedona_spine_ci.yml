name: Sedona Spine Frontend Validation

on:
  push:
    branches: [main]
    paths:
      - 'lean/**'
      - 'multiplicity/**'
      - 'docs/**'
      - 'pirtm-parser/**'
      - '.github/workflows/sedona_spine_ci.yml'
  pull_request:
    paths:
      - 'lean/**'
      - 'multiplicity/**'
      - 'docs/**'
      - 'pirtm-parser/**'

permissions:
  contents: read

jobs:
  lean-honesty-audit:
    name: Lean Axiom-Clean Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elan (Lean toolchain)
        uses: leanprover/lean-action@v1
        with:
          lean-version: v4.16.0

      - name: Lake update
        run: lake update
        working-directory: lean

      - name: Build Lean library
        run: lake build
        working-directory: lean

      - name: Mechanized-honesty audit
        run: bash scripts/honesty_audit.sh
        working-directory: lean

  rust-governance:
    name: Rust Governance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace

      - name: Run governance tests
        run: cargo test --test governance --workspace

  frontmatter-validation:
    name: Front-Matter Invariant Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for markdown processing)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint documentation
        run: |
          find docs -name '*.md' -exec markdownlint {} \; || true

      - name: Check invariant declarations in docs
        run: |
          ./scripts/check_invariant_declarations.sh || echo "Invariant check placeholder - implement in Phase C"
        working-directory: .

  admissibility-validator:
    name: AST Construction Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check for pirtm-parser (optional)
        run: |
          if [ -d "pirtm-parser" ]; then
            cargo test -p pirtm-parser --test ast_invariants 2>/dev/null || echo "pirtm-parser tests not yet implemented"
          else
            echo "pirtm-parser not present - skipping AST validation"
          fi

  archivum-provenance:
    name: Archivum Provenance Check
    runs-on: ubuntu-latest
    needs: [lean-honesty-audit, rust-governance]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify witness file exists
        run: |
          if [ -f "state/archivum/witnesses.jsonl" ]; then
            echo "Archivum witnesses.jsonl found"
            wc -l state/archivum/witnesses.jsonl
          else
            echo "No witness file yet - provenance check passes (initial state)"
          fi

      - name: Verify Git anchoring
        run: |
          echo "Git commit count: $(git rev-list --count HEAD)"
          echo "Archivum provenance ready for witness anchoring"